name: Build and Push Docker Image

on:
  push:
    paths:
      - 'image:tag'
  workflow_call:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read image name and tag
        id: image
        run: |
          IMAGE_TAG=$(cat image:tag)
          echo "name=${IMAGE_TAG%%:*}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE_TAG##*:}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
      
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *Docker image built and pushed successfully!*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Image", "value": "${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}", "short": true },
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                    { "title": "Workflow run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": true }
                  ]
                }
              ]
            }
